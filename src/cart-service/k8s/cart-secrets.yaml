# Kubernetes Secret for cart-service
# Version: 1.0.0
# Platform: E-commerce Microservices
# Namespace: ecommerce-prod
# Purpose: Secure storage of Redis credentials
# Note: Sensitive values MUST use sensitive=true and never be logged

apiVersion: v1
kind: Secret
metadata:
  name: cart-service-secrets
  namespace: ecommerce-prod
  labels:
    app: cart-service
    version: v1
    tier: backend
    cost-center: platform-ecommerce
type: Opaque
stringData:
  # Redis connection credentials
  REDIS_HOST: "cart-redis.ecommerce-prod.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_PASSWORD: "${REDIS_PASSWORD}"
---
