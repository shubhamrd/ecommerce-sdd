# Kubernetes Deployment for cart-service
# Version: 1.0.0
# Platform: E-commerce Microservices
# Namespace: ecommerce-prod

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: ecommerce-prod
  labels:
    app: cart-service
    version: v1
    tier: backend
    cost-center: platform-ecommerce
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
        version: v1
        tier: backend
        cost-center: platform-ecommerce
    spec:
      # Pod Security Standards - restricted profile
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      serviceAccountName: cart-service-sa
      automountServiceAccountToken: false
      containers:
        - name: cart-service
          image: cart-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              protocol: TCP
          resources:
            # Resource requests and limits per k8s-deployment-spec.md
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          # Liveness probe - MANDATORY per copilot-instructions.md
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness probe - MANDATORY per copilot-instructions.md
          readinessProbe:
            httpGet:
              path: /ready
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          env:
            # Redis configuration from Kubernetes Secrets
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: host
            - name: REDIS_PORT
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: port
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secrets
                  key: password
                  optional: true
            - name: CART_SERVICE_PORT
              value: "3000"
            - name: LOG_LEVEL
              value: "info"
            - name: NODE_ENV
              value: "production"
          # Security context for container
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp-volume
              mountPath: /tmp
            - name: cache-volume
              mountPath: /app/node_modules/.cache
      # Volumes
      volumes:
        - name: tmp-volume
          emptyDir: {}
        - name: cache-volume
          emptyDir: {}
      # Pod disruption budget for high availability
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: cart-service
      # Affinity rules for better distribution
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cart-service
                topologyKey: kubernetes.io/hostname
