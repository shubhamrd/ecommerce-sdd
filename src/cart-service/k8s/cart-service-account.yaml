# Service Account for cart-service
# Version: 1.0.0
# Platform: E-commerce Microservices
# Namespace: ecommerce-prod
# Purpose: Least-privilege IAM permissions for EKS

apiVersion: v1
kind: ServiceAccount
metadata:
  name: cart-service-sa
  namespace: ecommerce-prod
  labels:
    app: cart-service
    version: v1
    tier: backend
    cost-center: platform-ecommerce
  annotations:
    # IRSA annotation for AWS IAM roles
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/cart-service-role
    # External secrets integration
    eks.amazonaws.com/credential-access-key: cart-service-secrets
    # Pod identity for service mesh
    sidecar.istio.io/inject: "true"
